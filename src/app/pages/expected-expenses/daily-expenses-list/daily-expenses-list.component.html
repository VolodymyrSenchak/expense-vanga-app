@for (_ of dailyExpenses().controls; track $index) {
  <div [formGroup]="getGroup($index)" class="flex flex-gap-1">
    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Day of Month</mat-label>
      <input matInput type="number" formControlName="dayOfMonth" min="1" max="31">
    </mat-form-field>

    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Amount</mat-label>
      <input matInput type="number" formControlName="amount">
    </mat-form-field>

    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Comment</mat-label>
      <input matInput type="text" formControlName="comment">
    </mat-form-field>

    <button mat-icon-button color="warn" type="button" (click)="removeDailyExpense($index)">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
}

<button mat-button type="button" (click)="addDailyExpense()">Add Daily Expense</button>
